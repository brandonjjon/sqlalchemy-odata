name: Bug Report
description: Report a bug with sqlalchemy-odata
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code example or steps to reproduce the issue
      render: python
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Error traceback
      description: Full error output (if applicable)
      render: text
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: input
    id: package-version
    attributes:
      label: sqlalchemy-odata version
      placeholder: "0.1.0"
  - type: input
    id: odata-service
    attributes:
      label: OData service (if shareable)
      placeholder: "e.g. Northwind, SAP, custom"
